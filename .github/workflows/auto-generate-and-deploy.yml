name: Auto Generate and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    # 毎日 06:00 JST = 前日 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-build-deploy:
    # GitHub Actions 自身が push したコミットで無限ループしないようにする
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NODE_VERSION: '20'
      PYTHON_VERSION: '3.13'
      PYTHONUTF8: '1'
      TZ: 'Asia/Tokyo'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Setup Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        if: github.event_name != 'push'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install google-genai python-dotenv feedparser Pillow requests
          fi

      - name: Generate articles / images / affiliate links
        if: github.event_name != 'push'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm run generate:all

      - name: Commit generated content
        if: github.event_name != 'push'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-generate blog content [skip ci]"
            git push origin "${GITHUB_REF_NAME}"
          else
            echo "No changes to commit."
          fi

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
